<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcript Cleaner</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

<header>
  <h1>Transcript Cleaner</h1>
  <p>Convert .vtt or Teams .docx transcripts into clean, readable text.</p>
  <span class="privacy-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    100% private — files never leave your device
  </span>
</header>

<main>
  <div class="drop-zone" id="dropZone">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p>Drag &amp; drop .vtt or .docx files here, or <span class="browse-link">browse</span></p>
    <input type="file" id="fileInput" accept=".vtt,.docx" multiple>
  </div>

  <div class="options">
    <label for="backchannelToggle">Remove backchannels (mhm, yeah, ok&hellip;)</label>
    <span class="toggle">
      <input type="checkbox" id="backchannelToggle" checked>
      <span class="slider"></span>
    </span>
  </div>

  <div class="file-list" id="fileList"></div>

  <button class="convert-btn hidden" id="convertBtn">Convert</button>

  <div class="results hidden" id="results"></div>
</main>

<footer>
  All processing happens in your browser. No data is uploaded or stored anywhere.
</footer>

<script src="app.js"></script>
</body>
</html>
